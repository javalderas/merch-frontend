<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Merch — Mobile Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 24px 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e5e5;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
      justify-content: center;
    }

    button {
      background: #1a1a24;
      color: #aaa;
      border: 1px solid #2a2a3a;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #22223a; color: #ddd; border-color: #3a3a5a; }

    button.active {
      background: #4c1d95;
      border-color: #7c3aed;
      color: #e9d5ff;
    }

    .device-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Phone shell */
    .phone {
      position: relative;
      border-radius: 52px;
      background: #111118;
      box-shadow:
        inset 0 0 0 2px #2a2a3a,
        0 0 0 1px #1a1a24,
        0 32px 64px rgba(0,0,0,0.8),
        0 0 0 10px #0d0d14;
      overflow: hidden;
      transition: all 0.25s;
    }

    /* Dynamic island */
    .phone::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 28px;
      background: #0d0d14;
      border-radius: 20px;
      z-index: 100;
    }

    /* Home bar (no notch) */
    .phone .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 5px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      z-index: 100;
    }

    /* Side buttons */
    .phone .btn-side-right {
      position: absolute;
      right: -14px;
      top: 120px;
      width: 4px;
      height: 70px;
      background: #1e1e2a;
      border-radius: 0 3px 3px 0;
    }

    .phone .btn-side-left-1 {
      position: absolute;
      left: -14px;
      top: 90px;
      width: 4px;
      height: 30px;
      background: #1e1e2a;
      border-radius: 3px 0 0 3px;
    }

    .phone .btn-side-left-2 {
      position: absolute;
      left: -14px;
      top: 140px;
      width: 4px;
      height: 50px;
      background: #1e1e2a;
      border-radius: 3px 0 0 3px;
    }

    .phone .btn-side-left-3 {
      position: absolute;
      left: -14px;
      top: 200px;
      width: 4px;
      height: 50px;
      background: #1e1e2a;
      border-radius: 3px 0 0 3px;
    }

    iframe {
      display: block;
      border: none;
      padding-top: 44px;
    }

    /* iPad — no notch, different radius */
    .device-ipad .phone {
      border-radius: 20px;
      box-shadow:
        inset 0 0 0 2px #2a2a3a,
        0 0 0 1px #1a1a24,
        0 32px 64px rgba(0,0,0,0.8),
        0 0 0 12px #0d0d14;
    }

    .device-ipad .phone::before { display: none; }
    .device-ipad iframe { padding-top: 0; }

    .device-label {
      font-size: 12px;
      color: #444;
      letter-spacing: 0.05em;
    }

    .refresh-btn {
      font-size: 12px;
      padding: 6px 12px;
    }
  </style>
</head>
<body>
  <h1>Mobile Simulator</h1>

  <div class="controls">
    <button onclick="setDevice('iphone-se')" id="btn-iphone-se">iPhone SE · 375×667</button>
    <button onclick="setDevice('iphone-14')" id="btn-iphone-14" class="active">iPhone 14 · 390×844</button>
    <button onclick="setDevice('iphone-15-pro')" id="btn-iphone-15-pro">iPhone 15 Pro · 393×852</button>
    <button onclick="setDevice('iphone-plus')" id="btn-iphone-plus">iPhone Plus · 430×932</button>
    <button onclick="setDevice('ipad')" id="btn-ipad">iPad · 768×1024</button>
    <button class="refresh-btn" onclick="document.getElementById('frame').src = document.getElementById('frame').src">↺ Recargar</button>
  </div>

  <div class="device-wrap" id="device-wrap">
    <div class="phone" id="phone">
      <div class="btn-side-right"></div>
      <div class="btn-side-left-1"></div>
      <div class="btn-side-left-2"></div>
      <div class="btn-side-left-3"></div>
      <iframe id="frame" src="http://localhost:3000" title="Merch App Preview"></iframe>
      <div class="home-bar"></div>
    </div>
    <p class="device-label" id="device-label">iPhone 14 · 390×844</p>
  </div>

  <script>
    const devices = {
      'iphone-se':      { w: 375, h: 667,  label: 'iPhone SE · 375×667',       ipad: false },
      'iphone-14':      { w: 390, h: 844,  label: 'iPhone 14 · 390×844',       ipad: false },
      'iphone-15-pro':  { w: 393, h: 852,  label: 'iPhone 15 Pro · 393×852',   ipad: false },
      'iphone-plus':    { w: 430, h: 932,  label: 'iPhone Plus · 430×932',     ipad: false },
      'ipad':           { w: 768, h: 1024, label: 'iPad · 768×1024',           ipad: true  },
    }

    function setDevice(id) {
      const d = devices[id]
      const frame = document.getElementById('frame')
      const wrap = document.getElementById('device-wrap')

      frame.style.width  = d.w + 'px'
      frame.style.height = d.h + 'px'
      document.getElementById('device-label').textContent = d.label

      wrap.className = d.ipad ? 'device-wrap device-ipad' : 'device-wrap'

      document.querySelectorAll('.controls button:not(.refresh-btn)').forEach(b => b.classList.remove('active'))
      document.getElementById('btn-' + id).classList.add('active')
    }

    setDevice('iphone-14')
  </script>
</body>
</html>
